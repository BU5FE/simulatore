<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulatore Energetico Professionale</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; padding: 20px; color: #333; }
        .container { max-width: 800px; margin: auto; background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #2e7d32; font-size: 2em; margin-bottom: 30px; }
        label { display: block; margin-top: 20px; font-weight: 600; color: #555; }
        input, select { width: 100%; padding: 12px; margin-top: 8px; border: 1px solid #ddd; border-radius: 10px; font-size: 1em; transition: 0.3s; }
        input:focus, select:focus { border-color: #2e7d32; outline: none; box-shadow: 0 0 8px rgba(46,125,50,0.2); }
        .section { display: none; padding: 25px; margin-top: 25px; border-radius: 15px; border-left: 6px solid; }
        #light-section { background: #f1f8e9; border-color: #2e7d32; }
        #gas-section { background: #fff3e0; border-color: #e65100; }
        button { width: 100%; padding: 18px; margin-top: 40px; border: none; border-radius: 12px; font-size: 1.2em; font-weight: bold; cursor: pointer; background: #2e7d32; color: white; transition: 0.3s; }
        button:hover { background: #1b5e20; transform: translateY(-2px); }
        #result { margin-top: 40px; display: none; }
        .report-card { padding: 30px; border: 2px solid #2e7d32; border-radius: 15px; background: #fff; line-height: 1.6; }
    </style>
</head>
<body>

<div class="container">
    <h1>Analisi Risparmio Energetico</h1>
    
    <form id="calcForm">
        <label>Nome Cliente</label>
        <input type="text" id="nome" required placeholder="Inserisci nome cliente">

        <label>Tipologia Cliente</label>
        <select id="tipo">
            <option value="consumer">Consumer (Domestico)</option>
            <option value="business">Business (Azienda)</option>
        </select>

        <label>Cosa vuoi analizzare?</label>
        <select id="utenza" onchange="aggiornaVista()">
            <option value="">-- Seleziona Utenza --</option>
            <option value="L">Solo Luce</option>
            <option value="G">Solo Gas</option>
            <option value="LG">Luce e Gas</option>
        </select>

        <div id="light-section" class="section">
            <h3 style="color:#2e7d32; margin-top:0;">Dati Fornitura Luce</h3>
            <label>Frequenza Fatturazione</label>
            <select id="freqL" onchange="aggiornaVista()"><option value="1">Mensile</option><option value="2" selected>Bimestrale</option></select>
            <label>Mese di Riferimento Bolletta</label>
            <select id="meseL"></select>
            <label id="labelkWh">Consumo nel Periodo (kWh)</label>
            <input type="number" id="kWhP" placeholder="Es. 500">
            <label>Spesa Materia Energia nel Periodo (€)</label>
            <input type="number" id="costoL" step="0.01" placeholder="Es. 95.00">
            <label>Consumo Storico Annuo (kWh)</label>
            <input type="number" id="annuoL" placeholder="Es. 3000">
        </div>

        <div id="gas-section" class="section">
            <h3 style="color:#e65100; margin-top:0;">Dati Fornitura Gas</h3>
            <label>Frequenza Fatturazione</label>
            <select id="freqG" onchange="aggiornaVista()"><option value="1">Mensile</option><option value="2" selected>Bimestrale</option></select>
            <label>Mese di Riferimento Bolletta</label>
            <select id="meseG"></select>
            <label id="labelsmc">Consumo nel Periodo (smc)</label>
            <input type="number" id="smcP" placeholder="Es. 150">
            <label>Spesa Materia Gas nel Periodo (€)</label>
            <input type="number" id="costoG" step="0.01" placeholder="Es. 120.00">
            <label>Consumo Storico Annuo (smc)</label>
            <input type="number" id="annuoG" placeholder="Es. 1400">
        </div>

        <label>Offerta da Proporre</label>
        <select id="offerta">
            <option value="CASA">UltraGreen Casa</option>
            <option value="FIX">UltraGreen Fix</option>
            <option value="PMI">UltraGreen PMI</option>
            <option value="REVO">Revolution Tax</option>
        </select>

        <button type="button" onclick="calcola()">GENERA ANALISI PROFESSIONALE</button>
    </form>

    <div id="result"></div>
</div>

<script>
const PREZZI = {
    pun: {'07':0.112,'08':0.121,'09':0.115,'10':0.108,'11':0.119,'12':0.132,'01':0.124,'02':0.115},
    psv: {'07':0.36,'08':0.38,'09':0.40,'10':0.42,'11':0.45,'12':0.48,'01':0.45,'02':0.42}
};

const mesi = [
    {v:'07',t:'Luglio 2025'},{v:'08',t:'Agosto 2025'},{v:'09',t:'Settembre 2025'},
    {v:'10',t:'Ottobre 2025'},{v:'11',t:'Novembre 2025'},{v:'12',t:'Dicembre 2025'},
    {v:'01',t:'Gennaio 2026'},{v:'02',t:'Febbraio 2026'}
];

window.onload = function() {
    const sL = document.getElementById('meseL');
    const sG = document.getElementById('meseG');
    mesi.forEach(m => {
        sL.add(new Option(m.t, m.v));
        sG.add(new Option(m.t, m.v));
    });
    aggiornaVista();
}

function aggiornaVista() {
    const u = document.getElementById('utenza').value;
    document.getElementById('light-section').style.display = (u.includes('L')) ? 'block' : 'none';
    document.getElementById('gas-section').style.display = (u.includes('G')) ? 'block' : 'none';
    
    // Aggiorna etichette dinamiche per bimestrale/mensile
    const fL = document.getElementById('freqL').value;
    document.getElementById('labelkWh').innerText = (fL == "2") ? "Consumo Bimestrale (kWh)" : "Consumo Mensile (kWh)";
    
    const fG = document.getElementById('freqG').value;
    document.getElementById('labelsmc').innerText = (fG == "2") ? "Consumo Bimestrale (smc)" : "Consumo Mensile (smc)";
}

function calcola() {
    const nome = document.getElementById('nome').value;
    const tipo = document.getElementById('tipo').value;
    const off = document.getElementById('offerta').value;
    const utenza = document.getElementById('utenza').value;
    
    // OGT mensile base
    let ogtBase = (tipo === 'consumer') ? (off === 'FIX' ? 12.0 : 8.95) : (off === 'PMI' ? 19.95 : 14.95);
    
    let totAnnuo = 0;
    let html = `<div class="report-card">
                <h2 style="text-align:center; color:#2e7d32; margin-top:0;">Risultato Analisi per ${nome}</h2>
                <hr style="border:0; border-top:1px solid #eee; margin:20px 0;">`;

    if(utenza.includes('L')) {
        const f = parseInt(document.getElementById('freqL').value);
        const cP = parseFloat(document.getElementById('kWhP').value) || 0;
        const sP = parseFloat(document.getElementById('costoL').value) || 0;
        const cA = parseFloat(document.getElementById('annuoL').value) || 0;
        const m = document.getElementById('meseL').value;
        
        let quotaFissaPeriodo = ogtBase * f;
        let prezzoUnitario = PREZZI.pun[m] + 0.055; 
        let nuovaSpesaMateria = (cP * prezzoUnitario) + quotaFissaPeriodo;
        let risparmioPeriodo = sP - nuovaSpesaMateria;
        let risparmioAnnuo = (risparmioPeriodo / (cP || 1)) * cA;
        
        totAnnuo += risparmioAnnuo;
        html += `<p>💡 <b>LUCE:</b> Risparmio su base annua: <span style="color:#2e7d32; font-weight:bold;">€ ${risparmioAnnuo.toFixed(2)}</span></p>`;
    }

    if(utenza.includes('G')) {
        const f = parseInt(document.getElementById('freqG').value);
        const cP = parseFloat(document.getElementById('smcP').value) || 0;
        const sP = parseFloat(document.getElementById('costoG').value) || 0;
        const cA = parseFloat(document.getElementById('annuoG').value) || 0;
        const m = document.getElementById('meseG').value;
        
        let quotaFissaPeriodoG = ogtBase * f;
        let prezzoUnitarioG = PREZZI.psv[m] + 0.20;
        let nuovaSpesaMateriaG = (cP * prezzoUnitarioG) + quotaFissaPeriodoG;
        let risparmioPeriodoG = sP - nuovaSpesaMateriaG;
        let risparmioAnnuoG = (risparmioPeriodoG / (cP || 1)) * cA;
        
        totAnnuo += risparmioAnnuoG;
        html += `<p>🔥 <b>GAS:</b> Risparmio su base annua: <span style="color:#e65100; font-weight:bold;">€ ${risparmioAnnuoG.toFixed(2)}</span></p>`;
    }

    html += `<div style="background:#2e7d32; color:white; padding:20px; text-align:center; border-radius:12px; margin-top:25px;">
             <h3 style="margin:0;">RISPARMIO TOTALE: € ${totAnnuo.toFixed(2)} / anno</h3>
             </div></div>`;
    
    document.getElementById('result').innerHTML = html;
    document.getElementById('result').style.display = 'block';
    window.scrollTo({ top: document.getElementById('result').offsetTop - 20, behavior: 'smooth' });
}
</script>

</body>
</html>
