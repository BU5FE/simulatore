<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulatore Energetico Professionale</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Simulatore Professionale<br>Luce e Gas</h1>
        <form id="calculator-form">
            <label>Nome Cliente</label>
            <input type="text" id="clientName" required placeholder="Inserisci nome">

            <label>Tipologia Cliente</label>
            <select id="userType">
                <option value="consumer">Consumer (Domestico)</option>
                <option value="business">Business (Aziendale)</option>
            </select>
            
            <label>Utenze da Analizzare</label>
            <select id="utilityType">
                <option value="light">Solo Luce</option>
                <option value="gas">Solo Gas</option>
                <option value="lightAndGas">Luce e Gas</option>
            </select>

            <div id="light-section" style="display:none; border-left: 4px solid #2e7d32; padding-left: 15px; margin-top: 20px;">
                <h3>DATI LUCE</h3>
                <label>Frequenza Fatturazione Luce</label>
                <select id="freqLuce">
                    <option value="1">Mensile</option>
                    <option value="2">Bimestrale</option>
                </select>
                <label>Mese di Riferimento</label>
                <select id="monthLuce"></select>
                <label>Consumo Periodo (kWh)</label>
                <input type="number" id="kWhTot">
                <label>Spesa Materia Energia Periodo (€)</label>
                <input type="number" id="costMateriaLuce" step="0.01">
                <label>Consumo STORICO Annuo Luce (kWh)</label>
                <input type="number" id="annuoLuce">
            </div>

            <div id="gas-section" style="display:none; border-left: 4px solid #e65100; padding-left: 15px; margin-top: 20px;">
                <h3>DATI GAS</h3>
                <label>Frequenza Fatturazione Gas</label>
                <select id="freqGas">
                    <option value="1">Mensile</option>
                    <option value="2">Bimestrale</option>
                </select>
                <label>Mese di Riferimento</label>
                <select id="monthGas"></select>
                <label>Consumo Gas Periodo (smc)</label>
                <input type="number" id="smcTot">
                <label>Spesa Materia Gas Periodo (€)</label>
                <input type="number" id="costMateriaGas" step="0.01">
                <label>Consumo STORICO Annuo Gas (smc)</label>
                <input type="number" id="annuoGas">
            </div>

            <hr style="margin:20px 0;">
            <label>Offerta da Proporre</label>
            <select id="selectedOffer">
                <option value="ultraGreenCasa">UltraGreen Casa</option>
                <option value="ultraGreenFix">UltraGreen Fix</option>
                <option value="ultraGreenPMI">UltraGreen PMI</option>
                <option value="ultraGreenGrandiAziende">UltraGreen Grandi Aziende</option>
                <option value="revolutionTax">Revolution Tax</option>
            </select>

            <button type="submit" id="btnCalcola" style="margin-top:20px; background:#2e7d32; color:#fff; padding:15px; border:none; width:100%; cursor:pointer; font-weight:bold; border-radius:5px;">GENERA ANALISI</button>
        </form>

        <div id="result" style="display:none; margin-top:30px;"></div>
        
        <div id="export-actions" style="display:none; text-align:center; margin-top:20px; padding-bottom:50px;">
            <button onclick="exportDoc('pdf')" style="background:#d32f2f; color:#fff; padding:10px 20px; border:none; border-radius:5px; cursor:pointer;">Scarica Report PDF</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
