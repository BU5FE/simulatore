<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analisi Tecnica UltraGreen</title>
    <style>
        :root { --primary: #1b5e20; --secondary: #e65100; --bg: #f1f5f9; --red: #d32f2f; --green: #2e7d32; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); padding: 20px; color: #1a202c; }
        .container { max-width: 950px; margin: auto; background: white; padding: 35px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: var(--primary); font-weight: 800; text-transform: uppercase; margin-bottom: 25px; }
        .section { display: none; padding: 25px; margin-top: 20px; border-radius: 15px; border: 1px solid #e2e8f0; border-top: 6px solid; }
        #light-section { border-color: var(--primary); background: #f0fff4; }
        #gas-section { border-color: var(--secondary); background: #fffaf0; }
        .month-card { background: white; padding: 20px; border-radius: 12px; border: 1px solid #edf2f7; margin-top: 15px; }
        label { display: block; margin-top: 12px; font-weight: 700; font-size: 0.85rem; color: #4a5568; }
        input, select { width: 100%; padding: 12px; margin-top: 6px; border: 2px solid #edf2f7; border-radius: 10px; box-sizing: border-box; font-size: 1rem; }
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        button { width: 100%; padding: 20px; margin-top: 30px; border: none; border-radius: 12px; font-size: 1.3rem; font-weight: 800; cursor: pointer; background: var(--primary); color: white; transition: 0.2s; }
        
        /* OUTPUT BOX */
        #result { margin-top: 40px; display: none; }
        .report-card { padding: 35px; border-radius: 20px; background: white; border: 1px solid #e2e8f0; box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        .res-row { padding: 15px 0; border-bottom: 1px solid #f1f5f9; }
        .save-pos { color: var(--green); font-weight: 800; font-size: 1.4rem; }
        .save-neg { color: var(--red); font-weight: 800; font-size: 1.4rem; }
        .period-info { font-size: 0.9rem; color: #718096; margin-top: 4px; }
        .total-banner { margin-top: 25px; padding: 25px; border-radius: 15px; text-align: center; }
        .bg-green { background: #e8f5e9; border: 2px solid var(--green); }
        .bg-red { background: #ffebee; border: 2px solid var(--red); }
    </style>
</head>
<body>

<div class="container">
    <h1>Analisi Risparmio Energetico</h1>
    
    <label>Ragione Sociale / Cliente</label>
    <input type="text" id="nome" placeholder="Inserisci nome cliente">

    <label>Servizi Attivi</label>
    <select id="utenza" onchange="renderApp()">
        <option value="">-- Seleziona --</option>
        <option value="L">Solo Energia Elettrica</option>
        <option value="G">Solo Gas Naturale</option>
        <option value="LG">Luce e Gas</option>
    </select>

    <div id="light-section" class="section">
        <h3>⚡ ENERGIA ELETTRICA</h3>
        <div class="grid-2">
            <div>
                <label>Offerta Luce</label>
                <select id="offL">
                    <option value="CASA">UltraGreen CASA</option>
                    <option value="PMI">UltraGreen PMI</option>
                    <option value="AZIENDE">UltraGreen Grandi Aziende</option>
                    <option value="FIX">UltraGreen FIX</option>
                    <option value="REVO">Revolution Tax</option>
                </select>
            </div>
            <div>
                <label>Frequenza</label>
                <select id="freqL" onchange="renderApp()"><option value="1">Mensile</option><option value="2" selected>Bimestrale</option></select>
            </div>
        </div>
        <div class="grid-2">
            <div><label>Tipo Lettura</label><select id="modoL" onchange="renderApp()"><option value="mono">Monoraria</option><option value="fasce">A Fasce (F1-F2-F3)</option></select></div>
            <div><label>Consumo Annuo (kWh)</label><input type="number" id="annuoL"></div>
        </div>
        <div id="contMesiL"></div>
        <div class="grid-2">
            <div><label>Spesa Materia Bolletta (€)</label><input type="number" id="spesaL" step="0.01"></div>
            <div><label>PCV Attuale (€/mese)</label><input type="number" id="pcvL" value="12.00"></div>
        </div>
    </div>

    <div id="gas-section" class="section">
        <h3>🔥 GAS NATURALE</h3>
        <div class="grid-2">
            <div>
                <label>Offerta Gas</label>
                <select id="offG">
                    <option value="CASA">UltraGreen CASA</option>
                    <option value="PMI">UltraGreen PMI</option>
                    <option value="AZIENDE">UltraGreen Grandi Aziende</option>
                    <option value="FIX">UltraGreen FIX</option>
                    <option value="REVO">Revolution Tax</option>
                </select>
            </div>
            <div><label>Frequenza</label><select id="freqG" onchange="renderApp()"><option value="1">Mensile</option><option value="2" selected>Bimestrale</option></select></div>
        </div>
        <div id="contMesiG"></div>
        <div class="grid-2">
            <div><label>Spesa Materia Bolletta (€)</label><input type="number" id="spesaG" step="0.01"></div>
            <div><label>PCV Attuale (€/mese)</label><input type="number" id="pcvG" value="12.00"></div>
        </div>
        <label>Consumo Annuo (smc)</label><input type="number" id="annuoG">
    </div>

    <button onclick="calcola()">GENERA ANALISI</button>
    <div id="result"></div>
</div>

<script>
const PREZZI = {
    pun: {'09_25':{f1:0.128,f2:0.122,f3:0.108,m:0.115},'10_25':{f1:0.118,f2:0.112,f3:0.101,m:0.108},'11_25':{f1:0.132,f2:0.125,f3:0.114,m:0.119},'12_25':{f1:0.145,f2:0.138,f3:0.125,m:0.132},'01_26':{f1:0.138,f2:0.131,f3:0.118,m:0.124},'02_26':{f1:0.128,f2:0.121,f3:0.109,m:0.115}},
    psv: {'09_25':0.40, '10_25':0.42, '11_25':0.45, '12_25':0.48, '01_26':0.45, '02_26':0.42}
};
const mesiNomi = {'09_25':'Settembre 2025','10_25':'Ottobre 2025','11_25':'Novembre 2025','12_25':'Dicembre 2025','01_26':'Gennaio 2026','02_26':'Febbraio 2026'};

function renderApp() {
    const u = document.getElementById('utenza').value;
    document.getElementById('light-section').style.display = u.includes('L') ? 'block' : 'none';
    document.getElementById('gas-section').style.display = u.includes('G') ? 'block' : 'none';
    if(u.includes('L')) buildFields('L');
    if(u.includes('G')) buildFields('G');
    document.getElementById('result').style.display = 'none';
}

function buildFields(tipo) {
    const freq = document.getElementById('freq'+tipo).value;
    const modo = tipo === 'L' ? document.getElementById('modoL').value : 'mono';
    const cont = document.getElementById(tipo === 'L' ? 'contMesiL' : 'contMesiG');
    cont.innerHTML = "";
    for(let i=0; i<freq; i++) {
        let h = `<div class="month-card"><label>Mese ${i+1}</label><select id="m${tipo}${i}">${Object.keys(mesiNomi).map(k=>`<option value="${k}">${mesiNomi[k]}</option>`).join('')}</select>`;
        if(tipo === 'L' && modo === 'fasce') {
            h += `<div class="grid-3"><div><label>F1 (kWh)</label><input type="number" id="v${tipo}${i}f1" value="0"></div><div><label>F2 (kWh)</label><input type="number" id="v${tipo}${i}f2" value="0"></div><div><label>F3 (kWh)</label><input type="number" id="v${tipo}${i}f3" value="0"></div></div>`;
        } else { h += `<label>Consumo ${tipo==='L'?'kWh':'smc'}</label><input type="number" id="v${tipo}${i}" value="0">`; }
        h += `</div>`;
        cont.innerHTML += h;
    }
}

function formatResult(val, label, periodLabel, pVal) {
    const isSave = val < 0;
    const colorClass = isSave ? "save-pos" : "save-neg";
    const textPrefix = isSave ? "" : "Non c'è risparmio: +";
    return `
        <div class="res-row">
            <div><b>${label}</b></div>
            <div class="${colorClass}">${textPrefix} € ${val.toFixed(2)} / anno</div>
            <div class="period-info">Risparmio su base ${periodLabel}: € ${pVal.toFixed(2)}</div>
        </div>`;
}

function calcola() {
    let totR = 0, ut = document.getElementById('utenza').value, resH = "";

    if(ut.includes('L')) {
        let f = parseInt(document.getElementById('freqL').value), offL = document.getElementById('offL').value;
        let cB = 0, cMT = 0, spreadL = (offL === 'PMI') ? 0.035 : (offL === 'AZIENDE' ? 0.025 : 0.055), pcvT = 8.95;
        for(let i=0; i<f; i++) {
            let m = document.getElementById(`mL${i}`).value;
            if(document.getElementById('modoL').value === 'fasce') {
                let v1=parseFloat(document.getElementById(`vL${i}f1`).value)||0, v2=parseFloat(document.getElementById(`vL${i}f2`).value)||0, v3=parseFloat(document.getElementById(`vL${i}f3`).value)||0;
                cB += (v1+v2+v3); cMT += (v1*PREZZI.pun[m].f1 + v2*PREZZI.pun[m].f2 + v3*PREZZI.pun[m].f3);
            } else { let c = parseFloat(document.getElementById(`vL${i}`).value)||0; cB += c; cMT += (c * PREZZI.pun[m].m); }
        }
        let nL = cMT + (cB * spreadL) + (pcvT * f);
        let rPeriodo = nL - (parseFloat(document.getElementById('spesaL').value)||0);
        let rAnnuo = rPeriodo / (cB||1) * (parseFloat(document.getElementById('annuoL').value)||0);
        totR += rAnnuo;
        resH += formatResult(rAnnuo, `LUCE (${offL})`, f==1?"mensile":"bimestrale", rPeriodo);
    }

    if(ut.includes('G')) {
        let f = parseInt(document.getElementById('freqG').value), offG = document.getElementById('offG').value;
        let cBG = 0, cMTG = 0, spreadG = (offG === 'AZIENDE' ? 0.10 : 0.15), pcvTG = 8.95;
        for(let i=0; i<f; i++) {
            let m = document.getElementById(`mG${i}`).value, c = parseFloat(document.getElementById(`vG${i}`).value)||0;
            cBG += c; cMTG += (c * PREZZI.psv[m]);
        }
        let nG = cMTG + (cBG * spreadG) + (pcvTG * f);
        let rPG = nG - (parseFloat(document.getElementById('spesaG').value)||0);
        let rAG = rPG / (cBG||1) * (parseFloat(document.getElementById('annuoG').value)||0);
        totR += rAG;
        resH += formatResult(rAG, `GAS (${offG})`, f==1?"mensile":"bimestrale", rPG);
    }

    const rd = document.getElementById('result');
    const bannerClass = totR < 0 ? "bg-green" : "bg-red";
    rd.innerHTML = `<div class="report-card"><h3>Analisi per ${document.getElementById('nome').value.toUpperCase()}</h3>${resH}<div class="total-banner ${bannerClass}"><span>RISPARMIO TOTALE ANNUO STIMATO</span><h2>€ ${totR.toFixed(2)}</h2></div></div>`;
    rd.style.display = 'block';
    rd.scrollIntoView({ behavior: 'smooth' });
}
</script>
</body>
</html>
