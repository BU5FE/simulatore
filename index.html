<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analisi Risparmio Energetico - UltraGreen</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Roboto', sans-serif; background-color: #f4f7f6; color: #333; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1, h3 { color: #2e7d32; text-align: center; }
        .section-box { border: 1px solid #e0e0e0; padding: 20px; border-radius: 8px; margin-bottom: 20px; background: #fafafa; }
        label { font-weight: bold; display: block; margin-top: 10px; font-size: 0.9em; }
        input, select { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        .btn-calculate { background-color: #2e7d32; color: white; padding: 15px; border: none; width: 100%; border-radius: 5px; font-size: 1.1em; font-weight: bold; cursor: pointer; margin-top: 20px; transition: 0.3s; }
        .btn-calculate:hover { background-color: #1b5e20; }
        .btn-export { background-color: #1976d2; color: white; padding: 10px; border: none; border-radius: 5px; cursor: pointer; margin: 10px 5px; transition: 0.3s; }
        .row { display: flex; gap: 15px; flex-wrap: wrap; }
        .col { flex: 1; min-width: 200px; }
        #result { margin-top: 30px; display: none; }
        .hidden { display: none; }
    </style>
</head>
<body>
<div class="container">
    <h1>Analisi Tecnica UltraGreen</h1>
    
    <form id="calculator-form">
        <div class="section-box">
            <h3>Dati Cliente</h3>
            <div class="row">
                <div class="col">
                    <label for="userType">Tipo Cliente</label>
                    <select id="userType" required>
                        <option value="consumer">Privato (Consumer)</option>
                        <option value="business">Azienda (Business)</option>
                    </select>
                </div>
                <div class="col">
                    <label for="clientName">Ragione Sociale / Nome</label>
                    <input type="text" id="clientName" placeholder="Inserisci nome cliente" required>
                </div>
            </div>

            <label for="selectedOffer">Offerta Target</label>
            <select id="selectedOffer" required>
                <option value="">-- Seleziona Offerta --</option>
                <option id="opt-casa" value="ultraGreenCasa">UltraGreen Casa</option>
                <option value="ultraGreen">UltraGreen</option>
                <option value="ultraGreenPMI">UltraGreen PMI</option>
                <option value="ultraGreenGrandiAziende">UltraGreen Grandi Aziende</option>
                <option value="revolutionTax">Revolution Tax</option>
            </select>

            <label for="utilityType">Servizi da Analizzare</label>
            <select id="utilityType" required>
                <option value="">-- Seleziona --</option>
                <option value="light">Luce</option>
                <option value="gas">Gas</option>
                <option value="lightAndGas">Luce e Gas</option>
            </select>
        </div>
        <div id="light-section" class="section-box" style="display:none;">
            <h3>⚡ ENERGIA ELETTRICA</h3>
            <div class="row">
                <div class="col">
                    <label for="monthLuce">Mese Bolletta Riferimento</label>
                    <select id="monthLuce"></select>
                </div>
                <div class="col">
                    <label for="freqLuce">Frequenza Bolletta</label>
                    <select id="freqLuce">
                        <option value="1">Mensile</option>
                        <option value="2">Bimestrale</option>
                    </select>
                </div>
            </div>

            <div class="row">
                <div class="col">
                    <label for="tipoLettura">Tipo Lettura</label>
                    <select id="tipoLettura">
                        <option value="monoraria">Monoraria</option>
                        <option value="fasce">A Fasce (F1, F2, F3)</option>
                    </select>
                </div>
                <div class="col">
                    <label for="annuoLuce">Consumo Annuo Stimato (kWh)</label>
                    <input type="number" id="annuoLuce" placeholder="es. 2700">
                </div>
            </div>

            <div id="div-mono">
                <label for="kWhTot">Consumo Totale Bolletta (kWh)</label>
                <input type="number" id="kWhTot" placeholder="Inserisci kWh totali">
            </div>

            <div id="div-fasce" class="hidden">
                <div class="row">
                    <div class="col"><label>Consumo F1</label><input type="number" id="kWhF1" placeholder="kWh"></div>
                    <div class="col"><label>Consumo F2</label><input type="number" id="kWhF2" placeholder="kWh"></div>
                    <div class="col"><label>Consumo F3</label><input type="number" id="kWhF3" placeholder="kWh"></div>
                </div>
            </div>

            <div class="row">
                <div class="col">
                    <label for="costMateriaLuce">Spesa Materia Bolletta (€)</label>
                    <input type="number" step="0.01" id="costMateriaLuce" placeholder="Solo quota energia">
                </div>
                <div class="col">
                    <label for="pcvLuce">PCV Attuale Cliente (€/mese)</label>
                    <input type="number" step="0.01" id="pcvLuce" placeholder="es. 12.00">
                </div>
            </div>
        </div>
        <div id="gas-section" class="section-box" style="display:none;">
            <h3>🔥 GAS NATURALE</h3>
            <div class="row">
                <div class="col">
                    <label for="monthGas">Mese Bolletta Riferimento</label>
                    <select id="monthGas"></select>
                </div>
                <div class="col">
                    <label for="annuoGas">Consumo Annuo Stimato (smc)</label>
                    <input type="number" id="annuoGas" placeholder="es. 1200">
                </div>
            </div>

            <div class="row">
                <div class="col">
                    <label for="smcTot">Consumo Bolletta (smc)</label>
                    <input type="number" id="smcTot" placeholder="Inserisci smc totali">
                </div>
                <div class="col">
                    <label for="freqGas">Frequenza Bolletta</label>
                    <select id="freqGas">
                        <option value="1">Mensile</option>
                        <option value="2">Bimestrale</option>
                    </select>
                </div>
            </div>

            <div class="row">
                <div class="col">
                    <label for="costMateriaGas">Spesa Materia Bolletta (€)</label>
                    <input type="number" step="0.01" id="costMateriaGas" placeholder="Solo quota gas">
                </div>
                <div class="col">
                    <label for="pcvGas">QVD/OGT Attuale Cliente (€/mese)</label>
                    <input type="number" step="0.01" id="pcvGas" placeholder="es. 10.00">
                </div>
            </div>
        </div>

        <button type="submit" class="btn-calculate">GENERA ANALISI RISPARMIO</button>
    </form>

    <div id="result"></div>
    
    <div id="export-actions" style="display:none; text-align:center; margin-top:20px;">
        <button onclick="exportDoc()" class="btn-export">STAMPA REPORT / SALVA PDF</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
