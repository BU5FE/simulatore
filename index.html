<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulatore di Risparmio Energetico</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Simulatore di Risparmio<br>Luce e Gas</h1>
        <form id="calculator-form">
            
            <label for="clientName">Nome Cliente</label>
            <input type="text" id="clientName" name="clientName" required placeholder="Inserisci il nome del cliente">

            <label for="billingFrequency">Frequenza di Fatturazione Attuale</label>
            <select id="billingFrequency" name="billingFrequency">
                <option value="monthly">Attuale Fattura Mensile</option>
                <option value="bimonthly">Attuale Fattura Bimestrale</option>
            </select>
            
            <div id="billingNote" style="display:none; color: #d32f2f; margin-bottom: 20px; font-size: 0.9em; font-weight: bold;">
                Nota: La simulazione calcolerà il risparmio sul periodo selezionato (2 mesi).
            </div>

            <label for="userType">Tipologia Cliente</label>
            <select id="userType" name="userType">
                <option value="consumer">Consumer (domestico)</option>
                <option value="business">Business (aziendale)</option>
            </select>
            
            <label for="utilityType">Tipo di fornitura</label>
            <select id="utilityType" name="utilityType">
                <option value="light">Luce</option>
                <option value="gas">Gas</option>
                <option value="lightAndGas">Luce e Gas</option>
            </select>

            <hr style="border: 1px solid #eee; margin: 20px 0;">

            <div id="data-m1-fields">
                <h3 style="color: #2e7d32;">Dati Primo Mese</h3>
                <label for="monthSelection1">Mese di Riferimento</label>
                <select id="monthSelection1" name="monthSelection1">
                    <option value="2025-07">Luglio 2025</option>
                    <option value="2025-08">Agosto 2025</option>
                    <option value="2025-09">Settembre 2025</option>
                    <option value="2025-10">Ottobre 2025</option> 
                    <option value="2025-11">Novembre 2025</option>
                    <option value="2025-12">Dicembre 2025</option>
                    <option value="2026-01">Gennaio 2026</option>
                    <option value="2026-02">Febbraio 2026</option>
                </select>

                <div id="light-fields-m1">
                    <label for="consumptionType1">Tariffa Luce <span id="monthNameConsumptionType1"></span></label>
                    <select id="consumptionType1" name="consumptionType1">
                        <option value="monorario">Monorario</option>
                        <option value="fasce">A Fasce (F1, F2, F3)</option>
                    </select>

                    <div id="light-monorario-fields-m1">
                        <label for="currentConsumptionLight1">Consumo Luce (kWh) <span id="monthNameLightCons1"></span></label>
                        <input type="number" id="currentConsumptionLight1" name="currentConsumptionLight1" step="0.01">
                    </div>

                    <div id="light-fasce-fields-m1" style="display:none;">
                        <label>Consumo F1 (kWh)</label>
                        <input type="number" id="currentConsumptionF1_1" step="0.01">
                        <label>Consumo F2 (kWh)</label>
                        <input type="number" id="currentConsumptionF2_1" step="0.01">
                        <label>Consumo F3 (kWh)</label>
                        <input type="number" id="currentConsumptionF3_1" step="0.01">
                    </div>

                    <label for="currentPriceLight1">Spesa Materia Energia (€) <span id="monthNameLightPrice1"></span></label>
                    <input type="number" id="currentPriceLight1" step="0.01">

                    <label for="currentPCVLight1">Quota Fissa Mensile Luce (€)</label>
                    <input type="number" id="currentPCVLight1" step="0.01" value="12.00">
                </div>

                <div id="gas-fields-m1" style="display:none;">
                    <label for="currentConsumptionGas1">Consumo Gas (smc) <span id="monthNameGasCons1"></span></label>
                    <input type="number" id="currentConsumptionGas1" step="0.01">
                    
                    <label for="currentPriceGas1">Spesa Materia Gas (€) <span id="monthNameGasPrice1"></span></label>
                    <input type="number" id="currentPriceGas1" step="0.01">

                    <label for="currentPCVGas1">Quota Fissa Mensile Gas (€)</label>
                    <input type="number" id="currentPCVGas1" step="0.01" value="10.00">
                </div>
            </div>

            <div id="data-m2-fields" style="display:none;">
                <hr style="border-top: 2px solid #4caf50; margin: 30px 0;">
                <h3 style="color: #2e7d32;">Dati Secondo Mese</h3>
                <label for="monthSelection2">Mese di Riferimento 2</label>
                <select id="monthSelection2" name="monthSelection2"></select>

                <div id="light-fields-m2" style="display:none;">
                    <label for="consumptionType2">Tariffa Luce <span id="monthNameConsumptionType2"></span></label>
                    <select id="consumptionType2" name="consumptionType2">
                        <option value="monorario">Monorario</option>
                        <option value="fasce">A Fasce (F1, F2, F3)</option>
                    </select>
                    <div id="light-monorario-fields-m2">
                        <label>Consumo Luce (kWh) <span id="monthNameLightCons2"></span></label>
                        <input type="number" id="currentConsumptionLight2" step="0.01">
                    </div>
                    <div id="light-fasce-fields-m2" style="display:none;">
                        <label>Consumo F1 (kWh)</label>
                        <input type="number" id="currentConsumptionF1_2" step="0.01">
                        <label>Consumo F2 (kWh)</label>
                        <input type="number" id="currentConsumptionF2_2" step="0.01">
                        <label>Consumo F3 (kWh)</label>
                        <input type="number" id="currentConsumptionF3_2" step="0.01">
                    </div>
                    <label>Spesa Materia Energia (€) <span id="monthNameLightPrice2"></span></label>
                    <input type="number" id="currentPriceLight2" step="0.01">
                </div>

                <div id="gas-fields-m2" style="display:none;">
                    <label>Consumo Gas (smc) <span id="monthNameGasCons2"></span></label>
                    <input type="number" id="currentConsumptionGas2" step="0.01">
                    <label>Spesa Materia Gas (€) <span id="monthNameGasPrice2"></span></label>
                    <input type="number" id="currentPriceGas2" step="0.01">
                </div>
            </div>

            <hr style="border: 1px solid #eee; margin: 20px 0;">

            <label>Consumo Annuo Stimato Luce (kWh)</label>
            <input type="number" id="annualConsumptionLight" placeholder="Opzionale">
            <label>Consumo Annuo Stimato Gas (smc)</label>
            <input type="number" id="annualConsumptionGas" placeholder="Opzionale">

            <label for="selectedOffer">Nuova Offerta da Proporre</label>
            <select id="selectedOffer" name="selectedOffer">
                <option value="ultraGreenCasa">UltraGreen Casa</option>
                <option value="ultraGreenFix">UltraGreen Fix</option>
                <option value="ultraGreenPMI">UltraGreen PMI</option>
                <option value="ultraGreenGrandiAziende">UltraGreen Grandi Aziende</option>
                <option value="revolutionTax">Revolution Tax</option>
            </select>

            <button type="submit" style="margin-top: 20px; background-color: #2e7d32; color: white; padding: 15px; border: none; border-radius: 5px; cursor: pointer; width: 100%; font-size: 1.1em;">Calcola il tuo risparmio</button>
        </form>

        <div id="result" style="display:none; margin-top: 30px;"></div>

        <div id="export-actions" style="margin-top: 20px; display: none; text-align: center;">
            <button id="exportPdfBtn" type="button" style="background: #d32f2f; color: white; padding: 10px 20px; border: none; border-radius: 5px; margin: 5px; cursor: pointer;">Esporta PDF</button>
            <button id="exportImgBtn" type="button" style="background: #1976d2; color: white; padding: 10px 20px; border: none; border-radius: 5px; margin: 5px; cursor: pointer;">Esporta Immagine</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
