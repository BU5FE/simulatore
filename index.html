<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulatore Energetico PRO</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f2f5; padding: 20px; color: #333; }
        .container { max-width: 850px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #2e7d32; }
        label { display: block; margin-top: 15px; font-weight: bold; font-size: 0.9em; }
        input, select { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        .section { display: none; padding: 20px; margin-top: 20px; border-radius: 10px; border-left: 5px solid; }
        #light-section { background: #f1f8e9; border-color: #2e7d32; }
        #gas-section { background: #fff3e0; border-color: #e65100; }
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
        button { width: 100%; padding: 15px; margin-top: 30px; border: none; border-radius: 8px; font-size: 1.1em; font-weight: bold; cursor: pointer; background: #2e7d32; color: white; }
        #result { margin-top: 30px; display: none; }
        .report-card { padding: 25px; border: 2px solid #2e7d32; border-radius: 12px; background: #fff; }
    </style>
</head>
<body>

<div class="container">
    <h1>Simulatore Professionale Luce e Gas</h1>
    
    <form id="calcForm">
        <label>Nome Cliente</label>
        <input type="text" id="nome" required placeholder="Es. Rossi S.p.A.">

        <label>Tipologia Cliente</label>
        <select id="tipo">
            <option value="consumer">Consumer (Domestico)</option>
            <option value="business">Business (Azienda)</option>
        </select>

        <label>Utenza</label>
        <select id="utenza" onchange="aggiornaVista()">
            <option value="">Seleziona...</option>
            <option value="L">Solo Luce</option>
            <option value="G">Solo Gas</option>
            <option value="LG">Luce e Gas</option>
        </select>

        <div id="light-section" class="section">
            <h3 style="color:#2e7d32; margin-top:0;">DETTAGLIO LUCE</h3>
            <label>Fatturazione</label>
            <select id="freqL" onchange="aggiornaVista()"><option value="1">Mensile</option><option value="2" selected>Bimestrale</option></select>
            <label>Mese Bolletta</label>
            <select id="meseL"></select>
            
            <div class="grid-3">
                <div><label>F1 (kWh)</label><input type="number" id="f1" placeholder="0"></div>
                <div><label>F2 (kWh)</label><input type="number" id="f2" placeholder="0"></div>
                <div><label>F3 (kWh)</label><input type="number" id="f3" placeholder="0"></div>
            </div>

            <label>Spesa Materia Energia Periodo (€)</label>
            <input type="number" id="costoL" step="0.01">
            <label>Consumo Storico Annuo (kWh)</label>
            <input type="number" id="annuoL">
        </div>

        <div id="gas-section" class="section">
            <h3 style="color:#e65100; margin-top:0;">DETTAGLIO GAS</h3>
            <label>Fatturazione</label>
            <select id="freqG" onchange="aggiornaVista()"><option value="1">Mensile</option><option value="2" selected>Bimestrale</option></select>
            <label>Mese Bolletta</label>
            <select id="meseG"></select>
            <label>Consumo Gas Periodo (smc)</label>
            <input type="number" id="smcP">
            <label>Spesa Materia Gas Periodo (€)</label>
            <input type="number" id="costoG" step="0.01">
            <label>Consumo Storico Annuo (smc)</label>
            <input type="number" id="annuoG">
        </div>

        <label>Offerta Target</label>
        <select id="offerta">
            <option value="CASA">UltraGreen Casa</option>
            <option value="FIX">UltraGreen Fix</option>
            <option value="PMI">UltraGreen PMI</option>
            <option value="REVO">Revolution Tax</option>
        </select>

        <button type="button" onclick="calcola()">GENERA REPORT</button>
    </form>

    <div id="result"></div>
</div>

<script>
// Prezzi PUN medi (per ora teniamo i medi, se hai le fasce F1/F2/F3 le carichiamo)
const PREZZI = {
    pun: {'07':0.112,'08':0.121,'09':0.115,'10':0.108,'11':0.119,'12':0.132,'01':0.124,'02':0.115},
    psv: {'07':0.36,'08':0.38,'09':0.40,'10':0.42,'11':0.45,'12':0.48,'01':0.45,'02':0.42}
};

const mesi = [
    {v:'07',t:'Luglio 2025'},{v:'08',t:'Agosto 2025'},{v:'09',t:'Settembre 2025'},
    {v:'10',t:'Ottobre 2025'},{v:'11',t:'Novembre 2025'},{v:'12',t:'Dicembre 2025'},
    {v:'01',t:'Gennaio 2026'},{v:'02',t:'Febbraio 2026'}
];

window.onload = function() {
    const sL = document.getElementById('meseL');
    const sG = document.getElementById('meseG');
    mesi.forEach(m => {
        sL.add(new Option(m.t, m.v));
        sG.add(new Option(m.t, m.v));
    });
}

function aggiornaVista() {
    const u = document.getElementById('utenza').value;
    document.getElementById('light-section').style.display = (u.includes('L')) ? 'block' : 'none';
    document.getElementById('gas-section').style.display = (u.includes('G')) ? 'block' : 'none';
}

function calcola() {
    const nome = document.getElementById('nome').value;
    const tipo = document.getElementById('tipo').value;
    const off = document.getElementById('offerta').value;
    const utenza = document.getElementById('utenza').value;
    
    let ogtBase = (tipo === 'consumer') ? (off === 'FIX' ? 12.0 : 8.95) : (off === 'PMI' ? 19.95 : 14.95);
    let totAnnuo = 0;
    let html = `<div class="report-card"><h3>Analisi per ${nome}</h3>`;

    if(utenza.includes('L')) {
        const f = parseInt(document.getElementById('freqL').value);
        const f1 = parseFloat(document.getElementById('f1').value) || 0;
        const f2 = parseFloat(document.getElementById('f2').value) || 0;
        const f3 = parseFloat(document.getElementById('f3').value) || 0;
        const cP = f1 + f2 + f3;
        const sP = parseFloat(document.getElementById('costoL').value) || 0;
        const cA = parseFloat(document.getElementById('annuoL').value) || 0;
        const m = document.getElementById('meseL').value;
        
        // Calcolo semplificato su PUN medio del mese scelto
        let nuova = (cP * (PREZZI.pun[m] + 0.055)) + (ogtBase * f);
        let rAnnuo = ((sP - nuova) / (cP || 1)) * cA;
        totAnnuo += rAnnuo;
        html += `<p>Luce (F1+F2+F3: ${cP} kWh): Risparmio <b>€ ${rAnnuo.toFixed(2)}/anno</b></p>`;
    }

    if(utenza.includes('G')) {
        const f = parseInt(document.getElementById('freqG').value);
        const cP = parseFloat(document.getElementById('smcP').value) || 0;
        const sP = parseFloat(document.getElementById('costoG').value) || 0;
        const cA = parseFloat(document.getElementById('annuoG').value) || 0;
        const m = document.getElementById('meseG').value;
        
        let nuova = (cP * (PREZZI.psv[m] + 0.20)) + (ogtBase * f);
        let rAnnuo = ((sP - nuova) / (cP || 1)) * cA;
        totAnnuo += rAnnuo;
        html += `<p>Gas (${cP} smc): Risparmio <b>€ ${rAnnuo.toFixed(2)}/anno</b></p>`;
    }

    html += `<h2 style="color:green; text-align:center;">RISPARMIO TOTALE: € ${totAnnuo.toFixed(2)}</h2></div>`;
    document.getElementById('result').innerHTML = html;
    document.getElementById('result').style.display = 'block';
}
</script>
</body>
</html>
