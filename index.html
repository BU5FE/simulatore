<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulatore di Risparmio Energetico</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Simulatore di Risparmio<br>Luce e Gas</h1>
        <form id="calculator-form">
            
            <label for="clientName">Nome Cliente</label>
            <input type="text" id="clientName" name="clientName" required>

            <label for="billingFrequency">Frequenza di Fatturazione Attuale</label>
            <select id="billingFrequency" name="billingFrequency" onchange="updateMonthLabels()">
                <option value="monthly">Attuale Fattura Mensile</option>
                <option value="bimonthly">Attuale Fattura Bimestrale</option>
            </select>
            
            <div id="billingNote" style="display:none; color: #d32f2f; margin-top: -10px; margin-bottom: 20px; font-size: 0.9em; text-align: left;">
                Ricordati: la fatturazione con la nuova offerta sarà mensile
            </div>

            <div id="data-m1-fields">
                <label for="monthSelection1">Mese di Riferimento</label>
                <select id="monthSelection1" name="monthSelection1" onchange="updateMonthLabels()">
                    <option value="2025-07">Luglio 2025</option>
                    <option value="2025-08">Agosto 2025</option>
                    <option value="2025-09">Settembre 2025</option>
                    <option value="2025-10">Ottobre 2025</option> 
                    <option value="2025-11">Novembre 2025</option>
                    <option value="2025-12">Dicembre 2025</option>
                    <option value="2026-01">Gennaio 2026</option>
                    <option value="2026-02">Febbraio 2026</option>
                </select>

                <label for="userType">Scelta tra Consumer e Business</label>
                <select id="userType" name="userType">
                    <option value="consumer">Consumer (domestico)</option>
                    <option value="business">Business (aziendale)</option>
                </select>
                
                <label for="utilityType">Scelta del tipo di fornitura</label>
                <select id="utilityType" name="utilityType" onchange="toggleUtilityFields()">
                    <option value="light">Luce</option>
                    <option value="gas">Gas</option>
                    <option value="lightAndGas">Luce e Gas</option>
                </select>
                
                <div id="light-fields-m1">
                    <hr style="border-top: 1px solid #c8e6c9;">
                    <label for="consumptionType1">Tipologia Consumo Luce <span id="monthNameConsumptionType1">Mese</span></label>
                    <select id="consumptionType1" name="consumptionType1" onchange="updateLightConsumptionFieldsVisibility(1)">
                        <option value="monorario">Monorario</option>
                        <option value="fasce">A Fasce (F1, F2, F3)</option>
                    </select>

                    <div id="light-monorario-fields-m1">
                        <label for="currentConsumptionLight1">Consumo Luce Totale <span id="monthNameLightCons1">Mese</span> (kWh)</label>
                        <input type="number" id="currentConsumptionLight1">
                    </div>

                    <div id="light-fasce-fields-m1" style="display:none;">
                        <label for="currentConsumptionF1_1">Consumo F1 <span id="monthNameLightConsF1_1">Mese</span></label>
                        <input type="number" id="currentConsumptionF1_1">
                        <label for="currentConsumptionF2_1">Consumo F2 <span id="monthNameLightConsF2_1">Mese</span></label>
                        <input type="number" id="currentConsumptionF2_1">
                        <label for="currentConsumptionF3_1">Consumo F3 <span id="monthNameLightConsF3_1">Mese</span></label>
                        <input type="number" id="currentConsumptionF3_1">
                    </div>

                    <label for="currentPriceLight1">Spesa materia luce <span id="monthNameLightPrice1">Mese</span> (Euro)</label>
                    <input type="number" id="currentPriceLight1" step="0.01">

                    <div id="pcv-light-m1-container">
                        <label>PCV Mensile Luce (Euro)</label>
                        <input type="number" id="currentPCVLight1" step="0.01">
                    </div>
                </div>

                <div id="gas-fields-m1" style="display:none;">
                    <hr style="border-top: 1px solid #c8e6c9;">
                    <label for="currentConsumptionGas1">Consumo Gas <span id="monthNameGasCons1">Mese</span> (smc)</label>
                    <input type="number" id="currentConsumptionGas1">
                    <label for="currentPriceGas1">Spesa materia gas <span id="monthNameGasPrice1">Mese</span> (Euro)</label>
                    <input type="number" id="currentPriceGas1" step="0.01">
                    <div id="pcv-gas-m1-container">
                        <label>PCV Mensile Gas (Euro)</label>
                        <input type="number" id="currentPCVGas1" step="0.01">
                    </div>
                </div>
            </div>

            <!-- MENU OFFERTE IN FONDO -->
            <hr style="margin: 20px 0;">
            <label for="selectedOffer">Seleziona la Nuova Offerta</label>
            <select id="selectedOffer" name="selectedOffer">
                <option value="ultraGreenFix">Ultra Green Fix</option>
                <option value="revolutionTax">Revolution Tax</option>
                <option value="ultraGreenPMI">Ultra Green PMI</option>
                <option value="ultraGreenGrandiAziende">Ultra Green Grandi Aziende</option>
                <option value="ultraGreenCasa">Ultra Green Casa</option>
            </select>

            <button type="button" onclick="calculateSavings()" style="margin-top: 20px; width: 100%; padding: 15px; background: #4caf50; color: white; border: none; cursor: pointer;">CALCOLA RISPARMIO</button>
        </form>

        <div id="result" style="display:none; margin-top: 20px; padding: 20px; border: 2px solid #4caf50; background: #f9f9f9;"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
