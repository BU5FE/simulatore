<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulatore UltraGreen - Analisi Risparmio</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Roboto', sans-serif; background-color: #f0f2f5; color: #333; margin: 0; padding: 20px; }
        .container { max-width: 950px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h1, h3 { color: #1b5e20; text-align: center; margin-top: 0; }
        .section-box { border: 1px solid #e0e0e0; padding: 25px; border-radius: 10px; margin-bottom: 25px; background: #ffffff; }
        label { font-weight: bold; display: block; margin-top: 15px; font-size: 0.85em; color: #444; text-transform: uppercase; }
        input, select { width: 100%; padding: 12px; margin-top: 5px; border: 2px solid #eee; border-radius: 8px; box-sizing: border-box; font-size: 1em; transition: 0.3s; }
        input:focus, select:focus { border-color: #2e7d32; outline: none; background: #f1f8e9; }
        .btn-calculate { background: linear-gradient(135deg, #2e7d32, #1b5e20); color: white; padding: 18px; border: none; width: 100%; border-radius: 8px; font-size: 1.3em; font-weight: bold; cursor: pointer; margin-top: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); transition: 0.2s; }
        .btn-calculate:hover { transform: translateY(-2px); box-shadow: 0 6px 15px rgba(0,0,0,0.3); }
        .btn-export { background-color: #0277bd; color: white; padding: 14px 28px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 1.1em; transition: 0.2s; }
        .btn-export:hover { opacity: 0.9; transform: translateY(-1px); }
        .row { display: flex; gap: 20px; flex-wrap: wrap; margin-bottom: 10px; }
        .col { flex: 1; min-width: 180px; }
        .hidden { display: none !important; }
        .meseblock { background: #f9f9f9; padding: 15px; border-radius: 8px; border: 1px solid #eee; margin-top: 10px; }
        #result { margin-top: 30px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Analisi Tecnica UltraGreen</h1>
    
    <form id="calculator-form">
        <div class="section-box">
            <h3>Dati Anagrafici</h3>
            <div class="row">
                <div class="col">
                    <label for="userType">Segmento Cliente</label>
                    <select id="userType" required>
                        <option value="consumer">Privato (Consumer)</option>
                        <option value="business">Azienda (Business)</option>
                    </select>
                </div>
                <div class="col">
                    <label for="clientName">Nome / Ragione Sociale</label>
                    <input type="text" id="clientName" placeholder="es. Mario Rossi S.r.l." required>
                </div>
            </div>

            <label for="utilityType">Tipo di Analisi</label>
            <select id="utilityType" required>
                <option value="">-- Scegli Fornitura --</option>
                <option value="light">Luce</option>
                <option value="gas">Gas</option>
                <option value="lightAndGas">Luce & Gas</option>
            </select>
        </div>

        <div id="light-section" class="section-box" style="display:none;">
            <h3>⚡ CONSUMI LUCE</h3>
            <div class="row">
                <div class="col">
                    <label for="freqLuce">Ciclo Fatturazione</label>
                    <select id="freqLuce">
                        <option value="1">Mensile</option>
                        <option value="2">Bimestrale</option>
                    </select>
                </div>
                <div class="col">
                    <label for="tipoLettura">Profilo Lettura</label>
                    <select id="tipoLettura">
                        <option value="monoraria">Monoraria</option>
                        <option value="fasce">A Fasce (F1, F2, F3)</option>
                    </select>
                </div>
            </div>

            <div class="meseblock">
                <div class="row">
                    <div class="col">
                        <label for="monthLuce1">Mese Bolletta (1° Mese)</label>
                        <select id="monthLuce1"></select>
                    </div>
                </div>
                <div id="div-mono1">
                    <label for="kWhTot1">Consumo Totale Mese 1 (kWh)</label>
                    <input type="number" id="kWhTot1" placeholder="kWh totali 1° mese">
                </div>
                <div id="div-fasce1" class="hidden">
                    <div class="row">
                        <div class="col"><label for="kWhF1_M1">F1 (Mese 1)</label><input type="number" id="kWhF1_M1" placeholder="kWh"></div>
                        <div class="col"><label for="kWhF2_M1">F2 (Mese 1)</label><input type="number" id="kWhF2_M1" placeholder="kWh"></div>
                        <div class="col"><label for="kWhF3_M1">F3 (Mese 1)</label><input type="number" id="kWhF3_M1" placeholder="kWh"></div>
                    </div>
                </div>
            </div>

            <div id="light-mese2" class="meseblock hidden" style="background: #edf7ed;">
                <div class="row">
                    <div class="col">
                        <label for="monthLuce2">Mese Bolletta (2° Mese)</label>
                        <select id="monthLuce2"></select>
                    </div>
                </div>
                <div id="div-mono2">
                    <label for="kWhTot2">Consumo Totale Mese 2 (kWh)</label>
                    <input type="number" id="kWhTot2" placeholder="kWh totali 2° mese">
                </div>
                <div id="div-fasce2" class="hidden">
                    <div class="row">
                        <div class="col"><label for="kWhF1_M2">F1 (Mese 2)</label><input type="number" id="kWhF1_M2" placeholder="kWh"></div>
                        <div class="col"><label for="kWhF2_M2">F2 (Mese 2)</label><input type="number" id="kWhF2_M2" placeholder="kWh"></div>
                        <div class="col"><label for="kWhF3_M2">F3 (Mese 2)</label><input type="number" id="kWhF3_M2" placeholder="kWh"></div>
                    </div>
                </div>
            </div>

            <div class="row" style="margin-top:15px;">
                <div class="col">
                    <label for="annuoLuce">Consumo Annuo Stimato (kWh)</label>
                    <input type="number" id="annuoLuce" placeholder="es. 2700">
                </div>
                <div class="col">
                    <label for="costMateriaLuce">Spesa Energia Totale Bolletta (€)</label>
                    <input type="number" step="0.01" id="costMateriaLuce" placeholder="Solo quota energia">
                </div>
                <div class="col">
                    <label for="pcvAttualeLuce">PCV / OGT Attuale (€/Mese)</label>
                    <input type="number" step="0.01" id="pcvAttualeLuce" placeholder="Costo fisso mensile attuale">
                </div>
            </div>
        </div>

        <div id="gas-section" class="section-box" style="display:none;">
            <h3>🔥 CONSUMI GAS</h3>
            <div class="row">
                <div class="col">
                    <label for="freqGas">Ciclo Fatturazione</label>
                    <select id="freqGas">
                        <option value="1">Mensile</option>
                        <option value="2">Bimestrale</option>
                    </select>
                </div>
            </div>

            <div class="meseblock">
                <div class="row">
                    <div class="col">
                        <label for="monthGas1">Mese Bolletta (1° Mese)</label>
                        <select id="monthGas1"></select>
                    </div>
                    <div class="col">
                        <label for="smcTot1">Consumo Gas Mese 1 (smc)</label>
                        <input type="number" id="smcTot1" placeholder="smc consumati">
                    </div>
                </div>
            </div>

            <div id="gas-mese2" class="meseblock hidden" style="background: #fdf5e6;">
                <div class="row">
                    <div class="col">
                        <label for="monthGas2">Mese Bolletta (2° Mese)</label>
                        <select id="monthGas2"></select>
                    </div>
                    <div class="col">
                        <label for="smcTot2">Consumo Gas Mese 2 (smc)</label>
                        <input type="number" id="smcTot2" placeholder="smc consumati">
                    </div>
                </div>
            </div>

            <div class="row" style="margin-top:15px;">
                <div class="col">
                    <label for="annuoGas">Consumo Annuo Stimato (smc)</label>
                    <input type="number" id="annuoGas" placeholder="es. 1200">
                </div>
                <div class="col">
                    <label for="costMateriaGas">Spesa Gas Totale Bolletta (€)</label>
                    <input type="number" step="0.01" id="costMateriaGas" placeholder="Solo quota gas">
                </div>
                <div class="col">
                    <label for="pcvAttualeGas">PCV / OGT Attuale (€/Mese)</label>
                    <input type="number" step="0.01" id="pcvAttualeGas" placeholder="Costo fisso mensile attuale">
                </div>
            </div>
        </div>

        <div class="section-box" style="border: 2px solid #2e7d32; background: #f1f8e9;">
            <h3>🎯 SCELTA OFFERTE COMMERCIALI</h3>
            
            <div id="offer-light-row" class="row" style="border-bottom: 1px solid #c8e6c9; padding-bottom: 15px; margin-bottom: 15px;">
                <div class="col" style="flex: 2;">
                    <label for="selectedOfferLuce">Offerta LUCE</label>
                    <select id="selectedOfferLuce">
                        <option value="">-- Seleziona offerta Luce --</option>
                        <option id="opt-casa-luce" value="ultraGreenCasa">UltraGreen Casa</option>
                        <option value="ultraGreen">UltraGreen</option>
                        <option value="revolutionTax">Revolution Tax</option>
                        <option value="ultraGreenPMI">UltraGreen PMI</option>
                        <option value="ultraGreenGrandiAziende">UltraGreen Grandi Aziende</option>
                    </select>
                </div>
                <div class="col">
                    <label for="hasCapLuce">CAP Luce</label>
                    <select id="hasCapLuce">
                        <option value="no">No</option>
                        <option value="si">Sì (Protezione Tetto)</option>
                    </select>
                </div>
            </div>

            <div id="offer-gas-row" class="row">
                <div class="col" style="flex: 2;">
                    <label for="selectedOfferGas">Offerta GAS</label>
                    <select id="selectedOfferGas">
                        <option value="">-- Seleziona offerta Gas --</option>
                        <option id="opt-casa-gas" value="ultraGreenCasa">UltraGreen Casa</option>
                        <option value="ultraGreen">UltraGreen</option>
                        <option value="revolutionTax">Revolution Tax</option>
                        <option value="ultraGreenPMI">UltraGreen PMI</option>
                        <option value="ultraGreenGrandiAziende">UltraGreen Grandi Aziende</option>
                    </select>
                </div>
                <div class="col">
                    <label for="hasCapGas">CAP Gas</label>
                    <select id="hasCapGas">
                        <option value="no">No</option>
                        <option value="si">Sì (Protezione Tetto)</option>
                    </select>
                </div>
            </div>
        </div>

        <button type="submit" class="btn-calculate">GENERA ANALISI COMPARATIVA</button>
    </form>

    <div id="result"></div>
    
    <div id="export-actions" class="hidden" style="text-align:center; margin-top:25px; padding-top:20px; border-top:1px solid #ddd;">
        <button onclick="exportDoc('pdf')" class="btn-export" style="margin-right: 10px;">ESPORTA IN PDF</button>
        <button onclick="exportDoc('png')" class="btn-export" style="background-color: #4caf50;">SCARICA COME IMMAGINE (PNG)</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
